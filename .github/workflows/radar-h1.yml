name: 🚀 Executar Radar H1 US PDV

on:
  schedule:
    # Mar–Out (EDT = UTC-4) → 10–16 NY = 14–20 UTC, dispara 1x/hora aos :35
    - cron: "35 14-20 * 3-10 1-5"
    # Jan–Fev e Nov–Dez (EST = UTC-5) → 10–16 NY = 15–21 UTC, dispara 1x/hora aos :35
    - cron: "35 15-21 * 1,2,11,12 1-5"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: radar-h1
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --no-cache-dir yfinance pandas requests

      - name: Run radar H1 script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID_H1: ${{ secrets.TELEGRAM_CHAT_ID_H1 }}
          TELEGRAM_THREAD_ID_H1: ${{ secrets.TELEGRAM_THREAD_ID_H1 }}
        run: python radar_h1.py
