name: 🚀 Executar Radar H1 US PDV

on:
  # Disparo agendado agora é feito externamente (cron-job.org chamando a API
  # do GitHub via workflow_dispatch), porque o `schedule:` nativo do GitHub
  # estava falhando silenciosamente na maioria dos disparos
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: radar-h1
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --no-cache-dir yfinance pandas requests

      - name: Run radar H1 script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID_H1: ${{ secrets.TELEGRAM_CHAT_ID_H1 }}
          TELEGRAM_THREAD_ID_H1: ${{ secrets.TELEGRAM_THREAD_ID_H1 }}
        run: python radar_h1.py
