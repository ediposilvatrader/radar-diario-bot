name: Radar Diário

on:
  schedule:
    # 21:30 UTC = 18:30 BRT (UTC-3)
    # Formato cron: minuto hora dia mês dia-da-semana
    - cron: "30 21 * * 1-5"   # segunda a sexta (dias úteis da bolsa)

  # Permite rodar manualmente pelo GitHub para testar
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Confira o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependências de instalação
        run: pip install yfinance requests pandas

      - name: Executar script de radar
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python radar.py
